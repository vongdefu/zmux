name: Publish Release

on:
  push:
    tags:
      - "v*"
    branches:
      - release

permissions:
  contents: write # 允许创建 Release 并上传桌面端资产
  pages: write # 允许部署到 GitHub Pages
  id-token: write # 官方 Actions 部署 Pages 必需的身份验证

# 确保并发部署时，新的部署会取消排队中的旧部署
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
          - platform: "windows-latest"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. 初始化前端环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "yarn"

      # 2. Linux 环境依赖安装
      - name: Install Linux dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # 3. 初始化 Rust 环境
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      # 4. 安装前端依赖
      - name: Install frontend dependencies
        run: yarn install

      # 5. 使用 Tauri 官方 Action 执行构建并发布
      # ⚠️ 注意：tauri-action 内部会自动替你执行一次 `yarn build`（对应你配置的 beforeBuildCommand）
      # 这意味着此时 dist 目录里的网页产物其实已经由 tauri-action 顺便生成好了！
      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__
          releaseName: "App v__VERSION__"
          releaseBody: "See the assets to download this version and install."
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      # 6. 【基于 macOS 部署 Web】单独重新构建一次网页端产物
      # 显式清除 TAURI 环境变量，迫使 vite.config.js 走 base: "/zmux/" 逻辑，生成完美的网页端 dist 目录
      - name: Rebuild Web frontend for GitHub Pages (macOS only)
        if: matrix.platform == 'macos-latest' # 👈 严格限制仅在 macOS 平台上运行
        run: |
          unset TAURI_ENV_PLATFORM
          unset TAURI_PLATFORM
          yarn build

      # 7. 将 dist 目录上传为 GitHub Pages 的官方构建产物 (Artifact)
      - name: Upload Pages Artifact (macOS only)
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-pages-artifact@v3
        with:
          path: "dist" # 指定上传编译出的 dist 文件夹

      # 8. 直接将产物部署到 GitHub Pages
      - name: Deploy to GitHub Pages (macOS only)
        if: matrix.platform == 'macos-latest'
        uses: actions/deploy-pages@v4
